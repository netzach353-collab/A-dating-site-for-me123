<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveLink — התחברות</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      color: #ededed;
      font-family: 'Heebo', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      overflow-x: hidden;
    }

    /* ─── BACKGROUND ─── */
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 55% 45% at 80% 10%, rgba(232,69,122,0.14) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 10% 90%, rgba(168,85,247,0.12) 0%, transparent 70%);
    }

    /* ─── LAYOUT ─── */
    .page-wrap {
      position: relative; z-index: 1;
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px 48px;
      gap: 0;
    }

    /* ─── LOGO ─── */
    .logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #e8457a, #a855f7);
      border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 28px rgba(232,69,122,0.4);
    }
    .logo-icon svg { width: 24px; height: 24px; fill: #fff; }
    .logo-text {
      font-size: 1.6rem; font-weight: 900;
      background: linear-gradient(to left, #e8457a, #a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ─── HEADLINE ─── */
    .headline { text-align: center; margin-bottom: 32px; }
    .headline h1 { font-size: 1.7rem; font-weight: 800; line-height: 1.2; margin-bottom: 6px; }
    .headline p { font-size: 0.88rem; color: #666; }

    /* ─── CARD ─── */
    .card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 32px 28px;
      backdrop-filter: blur(16px);
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(to left, transparent, rgba(232,69,122,0.45), transparent);
      border-radius: 24px 24px 0 0;
    }

    /* ─── GOOGLE BUTTON ─── */
    .btn-google {
      width: 100%; height: 52px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #ccc; font-family: 'Heebo', sans-serif; font-size: 0.95rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-google:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.18); transform: translateY(-1px); }
    .btn-google:active { transform: translateY(0); }
    .google-icon { width: 20px; height: 20px; flex-shrink: 0; }

    /* ─── DIVIDER ─── */
    .or-divider {
      display: flex; align-items: center; gap: 12px; margin: 20px 0;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.07);
    }
    .or-divider span { font-size: 0.75rem; color: #555; white-space: nowrap; }

    /* ─── FIELDS ─── */
    .field { margin-bottom: 16px; }
    label {
      display: block; font-size: 0.78rem; color: #888; font-weight: 600;
      margin-bottom: 7px; letter-spacing: 0.02em;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      width: 17px; height: 17px; color: #555; pointer-events: none;
      display: flex; align-items: center;
    }
    .input-icon svg { width: 17px; height: 17px; }
    input {
      width: 100%; height: 52px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; color: #ededed;
      font-family: 'Heebo', sans-serif; font-size: 0.95rem;
      padding: 0 44px 0 16px;
      outline: none; transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    input:focus {
      border-color: rgba(232,69,122,0.55);
      box-shadow: 0 0 0 3px rgba(232,69,122,0.12);
      background: rgba(255,255,255,0.07);
    }
    input.error { border-color: rgba(239,68,68,0.55); }
    input::placeholder { color: #444; }

    /* SHOW/HIDE PASSWORD */
    .toggle-pw {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #555;
      display: flex; align-items: center; transition: color 0.2s;
    }
    .toggle-pw:hover { color: #999; }
    .toggle-pw svg { width: 17px; height: 17px; }

    /* ─── FORGOT ─── */
    .forgot-row {
      display: flex; justify-content: flex-start; margin-top: -8px; margin-bottom: 20px;
    }
    .forgot-link {
      font-size: 0.78rem; color: #e8457a; text-decoration: none; font-weight: 600;
      transition: opacity 0.2s;
    }
    .forgot-link:hover { opacity: 0.75; }

    /* ─── ERROR MSG ─── */
    .field-error { font-size: 0.72rem; color: #ef4444; margin-top: 5px; display: none; }
    .form-error {
      display: none; align-items: center; gap: 8px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 16px;
      font-size: 0.82rem; color: #f87171;
    }
    .form-error.show { display: flex; }
    .form-error svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ─── PRIMARY BUTTON ─── */
    .btn-primary {
      width: 100%; height: 56px; border-radius: 16px; border: none; cursor: pointer;
      background: linear-gradient(to left, #e8457a, #a855f7);
      color: #fff; font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 8px 24px rgba(232,69,122,0.3);
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 12px 30px rgba(232,69,122,0.35); }
    .btn-primary:active { transform: translateY(0); opacity: 1; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-primary svg { width: 18px; height: 18px; }

    /* SPINNER */
    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── REGISTER LINK ─── */
    .register-link {
      text-align: center; font-size: 0.84rem; color: #666; margin-top: 20px;
    }
    .register-link a { color: #e8457a; text-decoration: none; font-weight: 700; }
    .register-link a:hover { text-decoration: underline; }

    /* ─── FLOATING HEARTS (decoration) ─── */
    .hearts {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .heart {
      position: absolute; opacity: 0;
      animation: floatUp linear infinite;
      font-size: 1.1rem; filter: blur(0.5px);
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(0.8) rotate(-10deg); opacity: 0; }
      10%  { opacity: 0.25; }
      80%  { opacity: 0.15; }
      100% { transform: translateY(-100vh) scale(1.1) rotate(10deg); opacity: 0; }
    }

    /* ─── MOBILE ─── */
    @media (max-width: 480px) {
      .page-wrap { padding: 28px 14px 40px; }
      .card { padding: 24px 18px; border-radius: 20px; }
      .headline h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div class="bg-glow"></div>

<!-- FLOATING HEARTS -->
<div class="hearts" id="hearts"></div>

<div class="page-wrap">

  <!-- LOGO -->
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
    <span class="logo-text">LoveLink</span>
  </div>

  <!-- HEADLINE -->
  <div class="headline">
    <h1>ברוך/ה השב/ה ❤️</h1>
    <p>התחבר/י כדי להמשיך למצוא את ההתאמה שלך</p>
  </div>

  <!-- CARD -->
  <div class="card">

    <!-- FORM ERROR -->
    <div class="form-error" id="formError">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01"/></svg>
      <span id="formErrorText">אימייל או סיסמה שגויים. נסה/י שוב.</span>
    </div>

    <!-- GOOGLE -->
    <button class="btn-google" onclick="handleGoogle()">
      <svg class="google-icon" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      המשך עם Google
    </button>

    <div class="or-divider"><span>או עם אימייל וסיסמה</span></div>

    <!-- EMAIL -->
    <div class="field">
      <label for="email">כתובת אימייל</label>
      <div class="input-wrap">
        <div class="input-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
        <input type="email" id="email" placeholder="you@example.com" oninput="clearErrors()" onkeydown="onEnter(event)" autocomplete="email" />
      </div>
      <div class="field-error" id="emailErr">נא להזין כתובת אימייל תקינה</div>
    </div>

    <!-- PASSWORD -->
    <div class="field">
      <label for="password">סיסמה</label>
      <div class="input-wrap">
        <div class="input-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        <input type="password" id="password" placeholder="הסיסמה שלך" oninput="clearErrors()" onkeydown="onEnter(event)" autocomplete="current-password" />
        <button class="toggle-pw" type="button" onclick="togglePw()" id="togglePwBtn">
          <svg id="eyeIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
      <div class="field-error" id="pwErr">נא להזין סיסמה</div>
    </div>

    <!-- FORGOT -->
    <div class="forgot-row">
      <a href="forgot-password.html" class="forgot-link">שכחת סיסמה?</a>
    </div>

    <!-- SUBMIT -->
    <button class="btn-primary" id="submitBtn" onclick="handleLogin()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
      התחברות
    </button>

    <!-- REGISTER LINK -->
    <p class="register-link">עדיין אין לך חשבון? <a href="register.html">הצטרף/י עכשיו — בחינם</a></p>

  </div><!-- /card -->

</div><!-- /page-wrap -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = "https://xhqbruvpprevgmvysezh.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_vBbdxciJj8gdYvR1Zmiclg_G8GTFdnT";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

  /* ─── FLOATING HEARTS ─── */
  (function() {
    const container = document.getElementById('hearts');
    const emojis = ['❤️', '🩷', '💕', '💗', '✨'];
    for (let i = 0; i < 12; i++) {
      const el = document.createElement('span');
      el.className = 'heart';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.bottom = '-40px';
      el.style.fontSize = (0.7 + Math.random() * 0.8) + 'rem';
      el.style.animationDuration = (8 + Math.random() * 12) + 's';
      el.style.animationDelay = (Math.random() * 12) + 's';
      container.appendChild(el);
    }
  })();

  /* ─── SHOW / HIDE PASSWORD ─── */
  let pwVisible = false;
  function togglePw() {
    pwVisible = !pwVisible;
    const inp = document.getElementById('password');
    inp.type = pwVisible ? 'text' : 'password';
    document.getElementById('eyeIcon').innerHTML = pwVisible
      ? '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>'
      : '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
  }

  /* ─── CLEAR ERRORS ─── */
  function clearErrors() {
    document.getElementById('email').classList.remove('error');
    document.getElementById('password').classList.remove('error');
    document.getElementById('emailErr').style.display = 'none';
    document.getElementById('pwErr').style.display = 'none';
    document.getElementById('formError').classList.remove('show');
  }

  /* ─── ENTER KEY ─── */
  function onEnter(e) { if (e.key === 'Enter') handleLogin(); }

  /* ─── GOOGLE ─── */
async function handleGoogle() {
  const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/my-profile.html",
      queryParams: {
        prompt: "select_account"
      }
    }
  });

  if (error) {
    alert(error.message);
  }
}

  /* ─── LOGIN ─── */
  async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  let ok = true;

  clearErrors();

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('email').classList.add('error');
    document.getElementById('emailErr').style.display = 'block';
    ok = false;
  }

  if (!pw) {
    document.getElementById('password').classList.add('error');
    document.getElementById('pwErr').style.display = 'block';
    ok = false;
  }

  if (!ok) return;

  setLoading(true);

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: pw
  });

  if (error) {
    setLoading(false);
    document.getElementById('formErrorText').textContent =
      "אימייל או סיסמה שגויים";
    document.getElementById('formError').classList.add('show');
    document.getElementById('email').classList.add('error');
    document.getElementById('password').classList.add('error');
    return;
  }

  console.log("LOGIN SESSION:", data.session);

  window.location.href = "my-profile.html";
}

  function setLoading(on) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = on;
    btn.innerHTML = on
      ? '<div class="spinner"></div>'
      : '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>התחברות';
  }
</script>
</body>
</html>
