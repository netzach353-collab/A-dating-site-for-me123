<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveLink — פרופיל</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #ededed; font-family: 'Heebo', sans-serif; min-height: 100vh; }

    /* TOPBAR */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      height: 64px; background: rgba(12,12,12,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: 12px; padding: 0 16px;
    }
    .back-btn {
      background: none; border: none; cursor: pointer;
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #ededed; transition: background 0.2s; flex-shrink: 0;
    }
    .back-btn:hover { background: rgba(255,255,255,0.08); }
    .back-btn svg { width: 22px; height: 22px; }
    .topbar-title {
      font-size: 1rem; font-weight: 700; 
    }

.topbar-logo{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}
    
    .topbar-logo span {
      font-size: 1.1rem; font-weight: 800; 
      background: linear-gradient(to right, #e8457a, #a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* MAIN */
    main { padding-top: 80px; padding-bottom: 40px; max-width: 520px; margin: 0 auto; padding-left: 16px; padding-right: 16px; }

    /* HERO */
    .hero {
      position: relative; border-radius: 24px; overflow: hidden;
      margin-bottom: 20px; background: #111;
    }
    .hero img {
      width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block;
    }
    .hero-gradient {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
      padding: 32px 20px 20px;
    }
    .hero-name { font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .hero-age { font-size: 1.4rem; font-weight: 300; color: rgba(255,255,255,0.7); }
    .online-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(34,197,94,0.15); color: #22c55e;
      font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 999px;
      border: 1px solid rgba(34,197,94,0.25);
    }
    .online-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; }
    .hero-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .hero-meta-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.8rem; color: rgba(255,255,255,0.65);
    }
    .hero-meta-item svg { width: 14px; height: 14px; }

    /* ACTION BUTTONS */
    .actions { display: flex; gap: 12px; margin-bottom: 20px; }
    .like-big {
      flex: 1; height: 56px; border-radius: 16px; border: none; cursor: pointer;
      background: linear-gradient(to left, #e8457a, #c0315e);
      color: #fff; font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .like-big:hover { opacity: 0.9; }
    .like-big:active { transform: scale(0.97); }
    .like-big.liked { background: linear-gradient(to left, #555, #333); }
    .like-big svg { width: 20px; height: 20px; }
    .pass-btn {
      width: 56px; height: 56px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.12);
      background: none; cursor: pointer; color: #888;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: all 0.2s;
    }
    .pass-btn:hover { background: rgba(255,255,255,0.05); color: #ccc; }
    .pass-btn svg { width: 20px; height: 20px; }

    /* GOAL BADGE */
    .goal-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(232,69,122,0.12); color: #e8457a;
      border: 1px solid rgba(232,69,122,0.2);
      font-size: 0.8rem; font-weight: 600; padding: 6px 14px; border-radius: 999px;
      margin-bottom: 16px;
    }
    .goal-badge svg { width: 14px; height: 14px; }

    /* SECTION */
    .section { background: #111; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
    .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .section-header svg { width: 16px; height: 16px; color: #e8457a; flex-shrink: 0; }
    .section-header h3 { font-size: 0.85rem; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.05em; }
    .bio-text { font-size: 0.9rem; line-height: 1.6; color: #ccc; }

    /* INFO GRID */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .info-item { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 10px 12px; }
    .info-label { font-size: 0.7rem; color: #666; margin-bottom: 3px; }
    .info-value { font-size: 0.88rem; font-weight: 600; }

    /* INTERESTS */
    .interests-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .interest-chip {
      padding: 6px 14px; border-radius: 999px; font-size: 0.8rem;
      background: rgba(255,255,255,0.06); color: #ccc;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* PROFILE SELECTOR (demo) */
    .demo-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: rgba(12,12,12,0.95); border-top: 1px solid rgba(255,255,255,0.07);
      padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto;
    }
    .demo-bar::-webkit-scrollbar { display: none; }
    .demo-profile-btn {
      flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .demo-profile-btn img {
      width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(255,255,255,0.1); transition: border-color 0.2s;
    }
    .demo-profile-btn.active img { border-color: #e8457a; }
    .demo-profile-btn span { font-size: 0.65rem; color: #777; font-family: 'Heebo', sans-serif; max-width: 44px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .demo-label { font-size: 0.7rem; color: #555; align-self: center; flex-shrink: 0; padding-left: 4px; }

    .main-padding { padding-bottom: 100px !important; }
    .info-item2{
      margin-bottom: 13px;
    }

      .profile-tabs{
  position:relative;
  display:flex;
  width:100%;
  border-bottom:1px solid rgba(255,255,255,.07);
  background:rgba(10,10,10,.9);
  backdrop-filter:blur(16px);
  margin-bottom:24px;
}

.profile-tab{
  position:relative;
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  padding:12px 0;
  text-decoration:none;
  color:#777;
  font-size:.72rem;
  font-weight:600;
  font-family:'Heebo',sans-serif;
  border-bottom:2px solid transparent;
  transition:.2s;
}

.profile-tab svg{
  width:18px;
  height:18px;
}

.profile-tab:hover{
  color:#e8457a;
}

.profile-tab.active{
  color:#e8457a;
  border-bottom-color:#e8457a;
}
.hero-empty-avatar{
  width:100%;
  aspect-ratio:4/5;
  background:linear-gradient(
    135deg,
    rgba(232,69,122,.12),
    rgba(168,85,247,.12)
  );
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero-empty-avatar svg{
  width:120px;
  height:120px;
  color:rgba(255,255,255,.25);
}

.avatar-wrap{
  position:relative;
}

.avatar-overlay{
  position:absolute;
  inset:0;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;

  background:rgba(0,0,0,.35);
  border-radius:50%;
}

.avatar-text{
  color:#fff;
  font-size:.85rem;
  font-weight:600;
}

.avatar-actions{
  display:flex;
  gap:10px;
}

.avatar-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(10px);
  cursor:pointer;
}

.hero-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  justify-content: space-between;
  width: 100%;
  padding: 0 10px;
  pointer-events: none;
}
.hero-arrow {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  pointer-events: all;
  color: #fff;
  transition: background 0.2s;
  font-size: 30px;
}
.hero-arrow:hover { background: rgba(232,69,122,0.5); border-color: rgba(232,69,122,0.5); }
.hero-arrow svg { width: 18px; height: 18px; }
.topbar-logo span { font-size:1.15rem;font-weight:800;background:linear-gradient(to right,#e8457a,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
    .topbar-logo { display:flex;align-items:center;gap:8px; }
    .icon-btn { background:none;border:none;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#ededed;transition:background .2s; }
    .icon-btn:hover { background:rgba(255,255,255,0.08); }
    .icon-btn svg { width:20px;height:20px; }


    .sidebar-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:100; }
    .sidebar-overlay.open { display:block; }
    .sidebar { position:fixed;top:0;right:-288px;bottom:0;width:288px;background:#0d0d0d;z-index:101;display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,0.07);transition:right .3s cubic-bezier(.25,.46,.45,.94); }
    .sidebar.open { right:0; }
    .sidebar-header { display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:64px;border-bottom:1px solid rgba(255,255,255,0.07); }
    .sidebar-nav { flex:1;padding:12px; }
    .nav-item { display:flex; margin-bottom: 10px; align-items:center;gap:12px;padding:12px 16px;border-radius:12px;text-decoration:none;color:#888;font-size:.9rem;font-weight:500;transition:all .2s;cursor:pointer;border:none;background:none;width:100%;font-family:'Heebo',sans-serif; }
    .nav-item:hover { background:rgba(255,255,255,0.05);color:#ededed; }
    .nav-item.active { background:rgba(232,69,122,0.1);color:#e8457a; }
    .nav-item svg { width:20px;height:20px; }
    .sidebar-footer { padding:12px;border-top:1px solid rgba(255,255,255,0.07); }
    .logout-btn { display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;width:100%;background:none;border:none;cursor:pointer;color:#ef4444;font-family:'Heebo',sans-serif;font-size:.9rem; }
    .logout-btn svg { width:20px;height:20px; }


  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <button class="icon-btn" onclick="toggleSidebar()">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>

  <div class="topbar-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="#e8457a">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>
    <span>LoveLink</span>
  </div>

  <div style="width:40px"></div>
</header>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header"><span style="font-size:1.1rem;font-weight:800;background:linear-gradient(to right,#e8457a,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">LoveLink</span><button class="icon-btn" onclick="toggleSidebar()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button></div>
  <nav class="sidebar-nav">
    <a href="index.html" class="nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0"/></svg>דף ראשי / פרופילים</a>
    <a href="feed.html" class="nav-item"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>שמו לי לב</a>
  </nav>
  <div class="sidebar-footer"><button class="logout-btn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>התנתק</button></div>
</aside>

<!-- MAIN -->
<main class="main-padding">

    <div class="profile-tabs">
  <a href="my-profile.html" class="profile-tab">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
    </svg>
    <span>עריכת פרופיל</span>
  </a>

  <a href="profile-view.html?me=1" class="profile-tab active">     <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
    </svg>
    <span>איך אני נראה</span>
  </a>

  <a href="feed.html" class="profile-tab">
    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>
    <span>הפיד שלי</span>
  </a>
</div>


  <div id="profileContent"></div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://xhqbruvpprevgmvysezh.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_vBbdxciJj8gdYvR1Zmiclg_G8GTFdnT";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

let viewPhotos = [];
let currentPhotoIndex = 0;

function updateHeroPhoto() {
  const img = document.getElementById("heroPhoto");
  if (!img || !viewPhotos.length) return;
  img.src = viewPhotos[currentPhotoIndex];
}

function nextPhoto() {
  if (!viewPhotos.length) return;
  currentPhotoIndex = (currentPhotoIndex + 1) % viewPhotos.length;
  updateHeroPhoto();
}

function prevPhoto() {
  if (!viewPhotos.length) return;
  currentPhotoIndex =
    (currentPhotoIndex - 1 + viewPhotos.length) % viewPhotos.length;
  updateHeroPhoto();
}

async function loadProfileView() {
  const params = new URLSearchParams(window.location.search);
  const profileIdFromUrl = params.get("id");
  const isMe = params.get("me") === "1";
let profileId = profileIdFromUrl;

  if (isMe || !profileId) {
    const { data: { user } } = await supabaseClient.auth.getUser();

   /* if (!user) {
      window.location.href = "login.html";
      return;
    }*/

    profileId = user.id;
  }

  const { data: p, error } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", profileId)
    .single();

  if (error || !p) {
    document.getElementById("profileContent").innerHTML = "<p>הפרופיל לא נמצא</p>";
    return;
  }

  const visible = p.visible_fields || {};
const showAge = visible.age !== false;
const showGender = visible.gender !== false;
const showCity = visible.city !== false;
const showOccupation = visible.occupation !== false;
const showBio = visible.bio !== false;
const showInterests = visible.interests !== false;
const showGoal = visible.goal !== false;
const showPhone = visible.phone === true;

  viewPhotos = Array.isArray(p.photos) && p.photos.length
  ? p.photos
  : (p.avatar_url ? [p.avatar_url] : []);

currentPhotoIndex = 0;

  document.getElementById("profileContent").innerHTML = `
    <div class="hero">
${viewPhotos.length ? `
  <img id="heroPhoto" src="${viewPhotos[0]}" alt="${p.full_name || ''}">

  ${viewPhotos.length > 1 ? `
    <div class="hero-nav">
      <button class="hero-arrow" onclick="prevPhoto()">‹</button>
      <button class="hero-arrow" onclick="nextPhoto()">›</button>
    </div>
  ` : ''}
` : `
 <div class="hero-empty-avatar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
    </svg>
  </div>
`}


    <div class="hero-gradient">
        <div class="hero-name">
          ${p.full_name || ''}
        ${showAge && p.age ? `<span class="hero-age">${p.age}</span>` : ''}
        </div>
        <div class="hero-meta">
    ${showCity && p.city ? `<span class="hero-meta-item">📍 ${p.city}</span>` : ''}
    ${showOccupation && p.occupation ? `<span class="hero-meta-item">💼 ${p.occupation}</span>` : ''}
        </div>
      </div>
    </div>

    ${showGoal && p.goal ? `<div class="goal-badge">❤️ ${p.goal}</div>` : ''}

    ${showBio && p.bio ? `
      <div class="section">
        <div class="section-header"><h3>קצת על עצמי</h3></div>
        <p class="bio-text">${p.bio}</p>
      </div>
    ` : ''}

    <div class="section">
      <div class="section-header"><h3>פרטים</h3></div>
      <div class="info-grid">
      ${showCity && p.city ? `<div class="info-item"><div class="info-label">עיר</div><div class="info-value">${p.city}</div></div>` : ''}
      ${showGender && p.gender ? `<div class="info-item"><div class="info-label">מגדר</div><div class="info-value">${p.gender}</div></div>` : ''}
      ${showAge && p.age ? `<div class="info-item"><div class="info-label">גיל</div><div class="info-value">${p.age}</div></div>` : ''}
      ${showOccupation && p.occupation ? `<div class="info-item"><div class="info-label">מקצוע</div><div class="info-value">${p.occupation}</div></div>` : ''}
      </div>
    </div>

   ${showPhone && p.phone ? `
<div class="info-item info-item2">
  <div class="info-label">טלפון</div>
  <div class="info-value">${p.phone}</div>
</div>
` : ''}

  ${showInterests && Array.isArray(p.interests) && p.interests.length ? `
      <div class="section">
        <div class="section-header"><h3>תחומי עניין</h3></div>
        <div class="interests-wrap">
          ${p.interests.map(i => `<span class="interest-chip">${i}</span>`).join("")}
        </div>
      </div>
    ` : ''}
  `;
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
document.addEventListener("DOMContentLoaded", loadProfileView);
</script>
</body>
</html>
