<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>LoveLink — התחברות או הרשמה</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #080808;
      color: #ededed;
      font-family: "Heebo", sans-serif;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 20px;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;

      background:
        radial-gradient(
          ellipse 55% 45% at 80% 10%,
          rgba(232,69,122,.14),
          transparent 70%
        ),
        radial-gradient(
          ellipse 50% 40% at 10% 90%,
          rgba(168,85,247,.12),
          transparent 70%
        );
    }

    .card {
      position: relative;
      z-index: 1;

      width: 100%;
      max-width: 420px;

      padding: 32px 26px;

      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;

      text-align: center;
      backdrop-filter: blur(16px);
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;

      margin-bottom: 28px;
    }

    .heart {
      width: 44px;
      height: 44px;

      border-radius: 14px;

      display: flex;
      align-items: center;
      justify-content: center;

      background:
        linear-gradient(
          135deg,
          #e8457a,
          #a855f7
        );

      box-shadow:
        0 8px 24px rgba(232,69,122,.35);

      font-size: 22px;
      color: white;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 900;

      background:
        linear-gradient(
          to left,
          #e8457a,
          #a855f7
        );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 {
      font-size: 1.55rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #777;
      font-size: .9rem;
      line-height: 1.6;
      margin-bottom: 26px;
    }

    .btn-login {
      width: 100%;
      height: 56px;

      border-radius: 16px;
      border: none;

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      color: white;

      background:
        linear-gradient(
          to left,
          #e8457a,
          #a855f7
        );

      box-shadow:
        0 8px 24px rgba(232,69,122,.28);

      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;

      cursor: pointer;

      transition:
        transform .15s,
        opacity .2s;
    }

    .btn-login:hover {
      opacity: .9;
    }

    .btn-login:active {
      transform: scale(.98);
    }

    .btn-login:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }

    .google-icon {
      width: 21px;
      height: 21px;
      flex-shrink: 0;
    }

    .status {
      display: none;
      margin-top: 18px;

      color: #aaa;
      font-size: .83rem;
      line-height: 1.5;
    }

    .status.show {
      display: block;
    }

    .error {
      display: none;
      margin-top: 18px;

      padding: 11px 13px;
      border-radius: 12px;

      color: #f87171;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.18);

      font-size: .82rem;
      line-height: 1.5;
    }

    .error.show {
      display: block;
    }

    .back-link {
      display: inline-block;
      margin-top: 22px;

      color: #666;
      font-size: .82rem;
      text-decoration: none;
    }

    .back-link:hover {
      color: #aaa;
    }

    .spinner {
      width: 19px;
      height: 19px;

      border: 2px solid rgba(255,255,255,.3);
      border-top-color: white;
      border-radius: 50%;

      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="bg-glow"></div>

  <main class="card">

    <div class="logo">
      <div class="heart">♥</div>
      <div class="logo-text">LoveLink</div>
    </div>

    <h1>התחברות או הרשמה</h1>

    <p class="subtitle">
      בחרי חשבון Google. המערכת תבדוק אוטומטית
      אם כבר קיים לך פרופיל.
    </p>

    <button
      type="button"
      class="btn-login"
      id="googleBtn"
      onclick="continueWithGoogle()"
    >
      <svg class="google-icon" viewBox="0 0 48 48">
        <path
          fill="#EA4335"
          d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
        />
        <path
          fill="#4285F4"
          d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
        />
        <path
          fill="#FBBC05"
          d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
        />
        <path
          fill="#34A853"
          d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
        />
      </svg>

      התחברות / הרשמה עם Google
    </button>

    <div class="status" id="statusText">
      בודק את החשבון...
    </div>

    <div class="error" id="errorBox"></div>

    <a
      href="index.html"
      class="back-link"
    >
      חזרה לדף הראשי
    </a>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL =
      "https://xhqbruvpprevgmvysezh.supabase.co";

    const SUPABASE_ANON_KEY =
      "sb_publishable_vBbdxciJj8gdYvR1Zmiclg_G8GTFdnT";

    const supabaseClient =
      window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
      );

    const googleBtn =
      document.getElementById("googleBtn");

    const statusText =
      document.getElementById("statusText");

    const errorBox =
      document.getElementById("errorBox");

    let accountChecked = false;

    function getPageUrl(fileName) {
      return new URL(
        fileName,
        window.location.href
      ).href;
    }

    function showStatus(message) {
      statusText.textContent = message;
      statusText.classList.add("show");
    }

    function hideStatus() {
      statusText.classList.remove("show");
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add("show");
    }

    function hideError() {
      errorBox.classList.remove("show");
      errorBox.textContent = "";
    }

    function setButtonLoading(isLoading) {
      googleBtn.disabled = isLoading;

      if (isLoading) {
        googleBtn.innerHTML = `
          <span class="spinner"></span>
          מתחבר ל-Google...
        `;
      } else {
        googleBtn.innerHTML = `
          <svg class="google-icon" viewBox="0 0 48 48">
            <path
              fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
            />
            <path
              fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
            />
            <path
              fill="#FBBC05"
              d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
            />
            <path
              fill="#34A853"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
            />
          </svg>

          התחברות / הרשמה עם Google
        `;
      }
    }

    async function continueWithGoogle() {
      hideError();
      hideStatus();
      setButtonLoading(true);

      try {
        /*
        Google יחזיר את המשתמש לאותו דף.
        זה עובד גם ב-GitHub Pages כי נשמר שם המאגר בכתובת.
        */
        const redirectUrl =
          window.location.origin +
          window.location.pathname;

        console.log(
          "GOOGLE REDIRECT URL:",
          redirectUrl
        );

        const { error } =
          await supabaseClient.auth.signInWithOAuth({
            provider: "google",

            options: {
              redirectTo: redirectUrl,

              queryParams: {
                prompt: "select_account"
              }
            }
          });

        if (error) {
          throw error;
        }

      } catch (error) {
        console.error(
          "GOOGLE LOGIN ERROR:",
          error
        );

        showError(
          "שגיאה בהתחברות עם Google: " +
          error.message
        );

        setButtonLoading(false);
      }
    }

    async function checkAccountAfterGoogle() {
      if (accountChecked) return;

      accountChecked = true;
      hideError();

      try {
        const {
          data: { session },
          error: sessionError
        } = await supabaseClient.auth.getSession();

        if (sessionError) {
          throw sessionError;
        }

        /*
        אין משתמש מחובר.
        מציגים את הכפתור הרגיל.
        */
        if (!session?.user) {
          accountChecked = false;
          setButtonLoading(false);
          hideStatus();
          return;
        }

        const user = session.user;

        showStatus(
          "בודק אם כבר קיים לך פרופיל..."
        );

        console.log(
          "GOOGLE USER:",
          user.email,
          user.id
        );

        const {
          data: profile,
          error: profileError
        } = await supabaseClient
          .from("profiles")
          .select(`
            id,
            profile_completed
          `)
          .eq("id", user.id)
          .maybeSingle();

        if (profileError) {
          throw profileError;
        }

        /*
        יש פרופיל קיים ומלא:
        חוזרים לאינדקס.
        */
        if (profile?.profile_completed === true) {
          showStatus(
            "החשבון נמצא. מעביר לדף הראשי..."
          );

          window.location.replace(
            getPageUrl("index.html")
          );

          return;
        }

        /*
        אין פרופיל מלא:
        שומרים סימון כדי ש-register.html
        יעביר אוטומטית לשלב 2.
        */
        sessionStorage.setItem(
          "continue_google_registration",
          "1"
        );

        showStatus(
          "לא נמצא פרופיל מלא. מעביר להשלמת ההרשמה..."
        );

        window.location.replace(
          getPageUrl("register.html")
        );

      } catch (error) {
        console.error(
          "ACCOUNT CHECK ERROR:",
          error
        );

        showError(
          "לא ניתן לבדוק את החשבון: " +
          error.message
        );

        hideStatus();
        setButtonLoading(false);
        accountChecked = false;
      }
    }

    window.addEventListener(
      "DOMContentLoaded",
      checkAccountAfterGoogle
    );
  </script>

</body>
</html>
