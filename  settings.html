<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveLink — הגדרות</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #ededed; font-family: 'Heebo', sans-serif; min-height: 100vh; }
    .topbar { position:fixed;top:0;left:0;right:0;z-index:50;height:64px;background:rgba(12,12,12,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;padding:0 16px; }
    .topbar-logo span { font-size:1.15rem;font-weight:800;background:linear-gradient(to right,#e8457a,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
    .topbar-logo { display:flex;align-items:center;gap:8px; }
    .icon-btn { background:none;border:none;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#ededed; }
    .icon-btn svg { width:20px;height:20px; }

    main { padding: 80px 16px 40px; max-width: 520px; margin: 0 auto; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 24px; }

    .setting-card {
      background: #111; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; padding: 16px; margin-bottom: 14px;
    }
    .setting-row { display: flex; align-items: center; justify-content: space-between; }
    .setting-info { display: flex; align-items: center; gap: 12px; }
    .setting-icon { width: 20px; height: 20px; color: #e8457a; flex-shrink: 0; }
    .setting-icon svg { width: 20px; height: 20px; }
    .setting-title { font-weight: 600; font-size: 0.9rem; }
    .setting-desc { font-size: 0.75rem; color: #666; margin-top: 2px; }

    .toggle { position:relative;width:44px;height:24px;background:rgba(255,255,255,0.1);border-radius:999px;cursor:pointer;transition:background .2s;flex-shrink:0;border:none; }
    .toggle.on { background:#e8457a; }
    .toggle::after { content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s; }
    .toggle.on::after { transform:translateX(20px); }

    .privacy-btns { display: flex; gap: 10px; margin-top: 14px; }
    .outline-btn {
      flex: 1; height: 42px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15); background: none;
      color: #ccc; font-family: 'Heebo', sans-serif; font-size: 0.85rem;
      cursor: pointer; transition: all 0.2s;
    }
    .outline-btn:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.25); }

    .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 20px 0; }

    .danger-btn {
      width: 100%; height: 48px; border-radius: 12px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
      color: #ef4444; font-family: 'Heebo', sans-serif; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.2s;
    }
    .danger-btn:hover { background: rgba(239,68,68,0.18); }
    .danger-btn svg { width: 18px; height: 18px; }

    /* SIDEBAR */
    .sidebar-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:100; }
    .sidebar-overlay.open { display:block; }
    .sidebar { position:fixed;top:0;right:-288px;bottom:0;width:288px;background:#0d0d0d;z-index:101;display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,0.07);transition:right .3s cubic-bezier(.25,.46,.45,.94); }
    .sidebar.open { right:0; }
    .sidebar-header { display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:64px;border-bottom:1px solid rgba(255,255,255,0.07); }
    .sidebar-nav { flex:1;padding:12px; }
    .nav-item { display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;text-decoration:none;color:#888;font-size:.9rem;font-weight:500;transition:all .2s;cursor:pointer;border:none;background:none;width:100%;font-family:'Heebo',sans-serif; }
    .nav-item:hover { background:rgba(255,255,255,0.05);color:#ededed; }
    .nav-item.active { background:rgba(232,69,122,0.1);color:#e8457a; }
    .nav-item svg { width:20px;height:20px; }
    .sidebar-footer { padding:12px;border-top:1px solid rgba(255,255,255,0.07); }
    .logout-btn { display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;width:100%;background:none;border:none;cursor:pointer;color:#ef4444;font-family:'Heebo',sans-serif;font-size:.9rem; }
    .logout-btn svg { width:20px;height:20px; }
  </style>
</head>
<body>
<header class="topbar">
  <button class="icon-btn" onclick="toggleSidebar()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  <div class="topbar-logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="#e8457a"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span>LoveLink</span></div>
  <div style="width:40px"></div>
</header>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header"><span style="font-size:1.1rem;font-weight:800;background:linear-gradient(to right,#e8457a,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">LoveLink</span><button class="icon-btn" onclick="toggleSidebar()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button></div>
  <nav class="sidebar-nav">
    <a href="index.html" class="nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0"/></svg>פרופילים</a>
    <a href="feed.html" class="nav-item"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>שמו לי לב</a>
    <a href="my-profile.html" class="nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>הפרופיל שלי</a>
    <a href="settings.html" class="nav-item active"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>הגדרות</a>
  </nav>
  <div class="sidebar-footer"><button class="logout-btn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>התנתק</button></div>
</aside>

<main>
  <h1>הגדרות</h1>

  <div class="setting-card">
    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
        <div>
          <div class="setting-title">פרופיל פעיל</div>
          <div class="setting-desc">הפרופיל שלך יופיע ברשימה</div>
        </div>
      </div>
      <button class="toggle on" onclick="this.classList.toggle('on')"></button>
    </div>
  </div>

  <div class="setting-card">
    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div>
        <div>
          <div class="setting-title">פרטיות מהירה</div>
        </div>
      </div>
    </div>
    <div class="privacy-btns">
      <button class="outline-btn">הסתר הכל</button>
      <button class="outline-btn">הצג הכל</button>
    </div>
  </div>

  <div class="divider"></div>

  <button class="danger-btn">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
    התנתקות
  </button>
</main>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open');
  }
</script>
</body>
</html>
