<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveLink — שמו לי לב</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #ededed; font-family: 'Heebo', sans-serif; min-height: 100vh; }
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      height: 64px; background: rgba(12,12,12,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
    }
    .topbar-logo { display: flex; align-items: center; gap: 8px; }
    .topbar-logo span { font-size:1.15rem;font-weight:800;background:linear-gradient(to right,#e8457a,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
    .icon-btn { background:none;border:none;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#ededed;transition:background .2s; }
    .icon-btn:hover { background:rgba(255,255,255,0.08); }
    .icon-btn svg { width:20px;height:20px; }

    main { padding: 80px 16px 32px; max-width: 520px; margin: 0 auto; }
    h1 { font-size: 1.5rem; font-weight: 800; }
    .subtitle { font-size: 0.85rem; color: #666; margin-top: 4px; margin-bottom: 24px; }

    .like-list { display: flex; flex-direction: column; gap: 10px; }
    .like-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 16px;
      background: #111; border: 1px solid rgba(255,255,255,0.06);
      transition: box-shadow 0.2s;
    }
    .like-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .avatar-wrap { position: relative; flex-shrink: 0; }
    .avatar-wrap img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(232,69,122,0.3); }
    .heart-badge {
      position: absolute; bottom: -4px; left: -4px;
      width: 22px; height: 22px; background: #e8457a; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .heart-badge svg { width: 11px; height: 11px; fill: #fff; }
    .like-info { flex: 1; }
    .like-name { font-weight: 600; font-size: 0.9rem; }
    .like-text { font-size: 0.75rem; color: #777; margin-top: 2px; }
    .like-date { font-size: 0.72rem; color: #555; display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .like-date svg { width: 12px; height: 12px; }
    body::-webkit-scrollbar { display: none; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 0; text-align: center;
    }
    .empty-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(232,69,122,0.1); display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .empty-icon svg { width: 40px; height: 40px; color: rgba(232,69,122,0.4); }
    .empty-title { color: #888; font-size: 0.95rem; }
    .empty-sub { color: #555; font-size: 0.78rem; margin-top: 4px; }

    /* SIDEBAR */
    .sidebar-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:100; }
    .sidebar-overlay.open { display:block; }
    .sidebar { position:fixed;top:0;right:-288px;bottom:0;width:288px;background:#0d0d0d;z-index:101;display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,0.07);transition:right .3s cubic-bezier(.25,.46,.45,.94); }
    .sidebar.open { right:0; }
    .sidebar-header { display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:64px;border-bottom:1px solid rgba(255,255,255,0.07); }
    .sidebar-nav { flex:1;padding:12px; }
    .nav-item { display:flex; margin-bottom: 10px; align-items:center;gap:12px;padding:12px 16px;border-radius:12px;text-decoration:none;color:#888;font-size:.9rem;font-weight:500;transition:all .2s;cursor:pointer;border:none;background:none;width:100%;font-family:'Heebo',sans-serif; }
    .nav-item:hover { background:rgba(255,255,255,0.05);color:#ededed; }
    .nav-item.active { background:rgba(232,69,122,0.1);color:#e8457a; }
    .nav-item svg { width:20px;height:20px; }
    .sidebar-footer { padding:12px;border-top:1px solid rgba(255,255,255,0.07); }
    .logout-btn { display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;width:100%;background:none;border:none;cursor:pointer;color:#ef4444;font-family:'Heebo',sans-serif;font-size:.9rem;transition:background .2s; }
    .logout-btn:hover { background:rgba(239,68,68,0.08); }
    .logout-btn svg { width:20px;height:20px; }

     .profile-tabs{
  position:relative;
  display:flex;
  width:100%;
  border-bottom:1px solid rgba(255,255,255,.07);
  background:rgba(10,10,10,.9);
  backdrop-filter:blur(16px);
  margin-bottom:24px;
}

.profile-tab{
  position:relative;
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  padding:12px 0;
  text-decoration:none;
  color:#777;
  font-size:.72rem;
  font-weight:600;
  font-family:'Heebo',sans-serif;
  border-bottom:2px solid transparent;
  transition:.2s;
}

.profile-tab svg{
  width:18px;
  height:18px;
}

.profile-tab:hover{
  color:#e8457a;
}

.profile-tab.active{
  color:#e8457a;
  border-bottom-color:#e8457a;
}
  </style>
</head>
<body>

    <a href="feed.html" class="nav-item active"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>שמו לי לב</a>
  </nav>
  <div class="sidebar-footer"><button class="logout-btn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>התנתק</button></div>
